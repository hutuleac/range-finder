[pytest]
testpaths = tests
addopts =
    --strict-markers
    --cov=.
    --cov-report=term-missing
    --cov-fail-under=90

markers =
    slow: long-running tests (deselect with -m "not slow")
    integration: end-to-end tests that exercise real indicator/grid math

# In-memory SQLite engines used in unit tests aren't explicitly disposed, so
# CPython's GC emits a ResourceWarning on teardown. This is a test-harness
# artifact, not a production leak — filter just this one to keep output readable.
filterwarnings =
    ignore:unclosed database:ResourceWarning
