name: Deployment

on:
  push:
    branches: [main]

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const dep = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Streamlit Community Cloud',
              auto_merge: false,
              required_contexts: [],
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: dep.data.id,
              state: 'success',
              environment_url: 'https://range-finder.streamlit.app/',
              description: 'Live on Streamlit Community Cloud',
            });
